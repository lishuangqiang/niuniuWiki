name: niuniu-wiki

x-backend-environment: &backend-environment
  SPRING_DATASOURCE_URL: jdbc:postgresql://niuniu-wiki-postgres:5432/${POSTGRES_DB:-panda-wiki}
  SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-panda-wiki}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-panda-wiki-secret}
  REDIS_HOST: niuniu-wiki-redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ${REDIS_PASSWORD:-panda-wiki-redis-secret}
  RAG_CT_RAG_BASE_URL: http://niuniu-wiki-raglite:5050
  RAG_CT_RAG_API_KEY: ${RAG_CT_RAG_API_KEY:-sk-1234567890}
  S3_ENDPOINT: http://niuniu-wiki-minio:9000
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-s3panda-wiki}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-s3panda-wiki-secret}
  S3_BUCKET: static-file
  MQ_NATS_SERVER: nats://niuniu-wiki-nats:4222
  MQ_NATS_USER: ${MQ_NATS_USER:-panda-wiki}
  NATS_PASSWORD: ${NATS_PASSWORD:-panda-wiki-nats-secret}
  JWT_SECRET: ${JWT_SECRET:-panda-wiki-local-jwt-secret-change-before-production}
  TZ: Asia/Shanghai

services:
  niuniu-wiki-postgres:
    image: chaitin-registry.cn-hangzhou.cr.aliyuncs.com/chaitin/postgres-zhparser:17.6-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-panda-wiki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-panda-wiki-secret}
      POSTGRES_DB: ${POSTGRES_DB:-panda-wiki}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata17:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-panda-wiki} -d ${POSTGRES_DB:-panda-wiki}"]
      interval: 5s
      timeout: 3s
      retries: 20

  niuniu-wiki-raglite-db-init:
    image: chaitin-registry.cn-hangzhou.cr.aliyuncs.com/chaitin/postgres-zhparser:17.6-bookworm
    restart: "no"
    depends_on:
      niuniu-wiki-postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-panda-wiki-secret}
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        if ! psql -h niuniu-wiki-postgres -U ${POSTGRES_USER:-panda-wiki} -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='raglite'" | grep -q 1; then
          psql -h niuniu-wiki-postgres -U ${POSTGRES_USER:-panda-wiki} -d postgres -c 'CREATE DATABASE raglite';
        fi

  niuniu-wiki-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:-panda-wiki-redis-secret}
      - --appendonly
      - "yes"
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-panda-wiki-redis-secret}
      TZ: Asia/Shanghai

  niuniu-wiki-minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z-cpuv1
    restart: unless-stopped
    command: ["minio", "server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ACCESS_KEY: ${S3_ACCESS_KEY:-s3panda-wiki}
      MINIO_SECRET_KEY: ${S3_SECRET_KEY:-s3panda-wiki-secret}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - miniodata:/data

  niuniu-wiki-nats:
    image: nats:2.11.3-alpine
    restart: unless-stopped
    command:
      - --jetstream
      - --store_dir=/data
      - --http_port=8222
      - --user=${MQ_NATS_USER:-panda-wiki}
      - --pass=${NATS_PASSWORD:-panda-wiki-nats-secret}
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

  niuniu-wiki-qdrant:
    image: qdrant/qdrant:v1.14.1
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-panda-wiki-qdrant-secret}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage

  niuniu-wiki-raglite:
    image: chaitin-registry.cn-hangzhou.cr.aliyuncs.com/chaitin/raglite:v2.17.0
    restart: unless-stopped
    depends_on:
      niuniu-wiki-raglite-db-init:
        condition: service_completed_successfully
      niuniu-wiki-minio:
        condition: service_started
      niuniu-wiki-nats:
        condition: service_healthy
      niuniu-wiki-qdrant:
        condition: service_started
    environment:
      GIN_MODE: release
      DATABASE_POSTGRESQL_HOST: niuniu-wiki-postgres
      DATABASE_POSTGRESQL_USER: ${POSTGRES_USER:-panda-wiki}
      DATABASE_POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD:-panda-wiki-secret}
      DATABASE_QDRANT_HOST: niuniu-wiki-qdrant
      DATABASE_QDRANT_API_KEY: ${QDRANT_API_KEY:-panda-wiki-qdrant-secret}
      STORAGE_MINIO_ENDPOINT: niuniu-wiki-minio:9000
      STORAGE_MINIO_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-s3panda-wiki}
      STORAGE_MINIO_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-s3panda-wiki-secret}
      NATS_URL: nats://niuniu-wiki-nats:4222
      NATS_USER: ${MQ_NATS_USER:-panda-wiki}
      NATS_PASSWORD: ${NATS_PASSWORD:-panda-wiki-nats-secret}
      EMBEDDER_RPM: "800"
      LLM_RPM: "50"
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:5050:5050"
    volumes:
      - raglitedata:/data

  niuniu-wiki-crawler:
    image: chaitin-registry.cn-hangzhou.cr.aliyuncs.com/chaitin/anydoc:v0.9.11
    restart: unless-stopped
    init: true
    depends_on:
      niuniu-wiki-minio:
        condition: service_started
      niuniu-wiki-nats:
        condition: service_healthy
    environment:
      GLOG_GLOBAL_LEVEL: info
      NAMESPACE: anydoc
      MQ_NATS_URL: nats://niuniu-wiki-nats:4222
      MQ_NATS_USER: ${MQ_NATS_USER:-panda-wiki}
      MQ_NATS_PASSWORD: ${NATS_PASSWORD:-panda-wiki-nats-secret}
      OSS_MINIO_ACCESS_KEY: ${S3_ACCESS_KEY:-s3panda-wiki}
      OSS_MINIO_SECRET_KEY: ${S3_SECRET_KEY:-s3panda-wiki-secret}
      OSS_MINIO_ENDPOINT: niuniu-wiki-minio:9000
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:8081:8080"

  niuniu-wiki-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      niuniu-wiki-postgres:
        condition: service_healthy
      niuniu-wiki-redis:
        condition: service_healthy
      niuniu-wiki-minio:
        condition: service_started
      niuniu-wiki-nats:
        condition: service_healthy
      niuniu-wiki-raglite:
        condition: service_started
    environment:
      <<: *backend-environment
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      FLYWAY_ENABLED: "true"
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8000/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s

  niuniu-wiki-consumer:
    build:
      context: ./backend
      dockerfile: Dockerfile.consumer
    restart: unless-stopped
    depends_on:
      niuniu-wiki-api:
        condition: service_healthy
      niuniu-wiki-nats:
        condition: service_healthy
    environment:
      <<: *backend-environment
      FLYWAY_ENABLED: "false"
    healthcheck:
      test: ["CMD-SHELL", "ps | grep -q '[n]iuniu-wiki.jar'"]
      interval: 10s
      timeout: 3s
      retries: 10

  niuniu-wiki-admin:
    build:
      context: ./web
      dockerfile: admin/Dockerfile
    restart: unless-stopped
    depends_on:
      niuniu-wiki-api:
        condition: service_healthy
    ports:
      - "127.0.0.1:2443:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/"]
      interval: 5s
      timeout: 3s
      retries: 20

  niuniu-wiki-app:
    build:
      context: ./web
      dockerfile: app/Dockerfile
      args:
        TARGET: http://niuniu-wiki-api:8000
        STATIC_FILE_TARGET: http://niuniu-wiki-minio:9000
        DEV_KB_ID: ${DEV_KB_ID:-00000000-0000-0000-0000-000000000001}
    restart: unless-stopped
    depends_on:
      niuniu-wiki-api:
        condition: service_healthy
    environment:
      TARGET: http://niuniu-wiki-api:8000
      STATIC_FILE_TARGET: http://niuniu-wiki-minio:9000
      DEV_KB_ID: ${DEV_KB_ID:-00000000-0000-0000-0000-000000000001}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:3010:3010"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3010/"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s

volumes:
  pgdata17:
    name: ${POSTGRES_VOLUME_NAME:-llmwiki_pgdata17}
    external: true
  redisdata:
    name: ${REDIS_VOLUME_NAME:-llmwiki_redisdata}
    external: true
  miniodata:
    name: ${MINIO_VOLUME_NAME:-llmwiki_miniodata}
    external: true
  natsdata:
    name: ${NATS_VOLUME_NAME:-llmwiki_natsdata}
    external: true
  qdrantdata:
    name: ${QDRANT_VOLUME_NAME:-llmwiki_qdrantdata}
    external: true
  raglitedata:
    name: ${RAGLITE_VOLUME_NAME:-llmwiki_raglitedata}
    external: true
